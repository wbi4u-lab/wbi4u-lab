<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBI4U Lab : AI와 교육의 공존</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary: #2563eb;
            --accent: #3b82f6;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --glass: rgba(255, 255, 255, 0.85);
        }
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }
        .lab-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 4rem 2rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: white;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            margin: 0 0 1.5rem 0;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, #1e293b, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .book-title {
            font-size: 1.4rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            font-weight: 600;
        }
        .description {
            font-size: 1.15rem;
            line-height: 1.8;
            color: var(--text-sub);
            margin-bottom: 3rem;
            word-break: keep-all;
        }
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 3rem;
        }
        .btn {
            text-decoration: none;
            padding: 1rem;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            color: var(--text-main);
            border: 1px solid #e2e8f0;
        }
        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn.active {
            background: var(--primary);
            color: white;
            border: none;
        }
        .footer {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
    <div class="lab-card">
        <div class="badge">EST. 2026</div>
        <h1>With AI For U <span style="font-weight: 300; color: #94a3b8;">Lab</span></h1>
        <div class="book-title">“인공지능이 답할 때 교육은 무엇을 묻는가”</div>
        <p class="description">
            기술의 속도보다 교육의 본질을 먼저 고민하는 곳.<br>
            교실 밖에서 그리는 새로운 교육의 지도를 시작합니다.
        </p>
        
        <div class="button-grid">
            <a href="http://eduict.org" target="_blank" class="btn active">교컴 카페</a>
            <a href="http://educrit.net" target="_blank" class="btn">브런치 교실밖</a>
            <a href="http://edudir.net" target="_blank" class="btn">교실밖선생님</a>
            <a href="https://facebook.com" target="_blank" class="btn">페이스북</a>
        </div>

        <div class="footer">
            © 2026 WBI4U Lab. Designed by Ham Young-Gi
        </div>
    </div>
</body>
</html>
