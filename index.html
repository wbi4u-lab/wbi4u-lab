<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WBI4U Lab : AI와 교육의 공존</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        :root {
            --primary-color: #1a73e8;
            --text-dark: #202124;
            --text-light: #5f6368;
            --bg-gray: #f8f9fa;
        }
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-gray);
            color: var(--text-dark);
        }
        .container {
            text-align: center;
            padding: 4rem 2rem;
            max-width: 800px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }
        .logo {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 1.5rem;
            line-height: 1.2;
            letter-spacing: -1px;
        }
        .description {
            font-size: 1.25rem;
            line-height: 1.8;
            color: var(--text-light);
            font-weight: 300;
            margin-bottom: 3rem;
        }
        .highlight {
            color: var(--primary-color);
            font-weight: 600;
        }
        /* 버튼 스타일 */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .btn {
            text-decoration: none;
            padding: 1rem 1.8rem;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid #e0e0e0;
        }
        .btn-cafe { background: #03c75a; color: white; border: none; } /* 네이버 초록 */
        .btn-brunch { background: #333; color: white; border: none; } /* 브런치 블랙 */
        .btn-blog { background: white; color: #03c75a; border: 1px solid #03c75a; }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .footer {
            margin-top: 4rem;
            font-size: 0.9rem;
            color: #bdc1c6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">WBI4U Lab</div>
        <h1>With AI For U <span style="color: #bdc1c6;">Lab</span></h1>
        <p class="description">
            인공지능이 답할 때 교육은 무엇을 묻는가 <span class="highlight">지적인 실험실</span><br>
            교실밖에서 그리는 새로운 교육의 지도를 시작합니다.
        </p>
        
        <div class="button-group">
            <a href="http://eduict.org" target="_blank" class="btn btn-cafe">교컴 카페</a>
            <a href="http://educrit.net" target="_blank" class="btn btn-brunch">브런치 교실밖</a>
            <a href="http://edudir.net" target="_blank" class="btn btn-blog">교실밖선생님</a>
            <a href="https://www.facebook.com/younggi.ham" target="_blank" class="btn btn-blog">페이스북 교실밖</a>

        </div>

        <div class="footer">
            © 2026 WBI4U Lab. Created by Ham Young-Gi
        </div>
    </div>
</body>
</html>
