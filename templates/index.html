<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>With AI For U Lab</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #0b192c; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 40px; width: 85%; max-width: 900px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; align-items: center; }
        h1 { margin: 0 0 10px 0; font-size: 2.5em; letter-spacing: 2px; }
        h3 { margin: 0 0 30px 0; font-weight: 300; color: #b0bec5; }
        .menu-container { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .menu-btn { background: transparent; border: 1px solid rgba(255, 255, 255, 0.4); color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: all 0.3s ease; }
        .menu-btn:hover { background: rgba(255, 255, 255, 0.2); border-color: white; }
        .menu-btn.active { background: #3498db; border-color: #3498db; font-weight: bold; }
        #chat-box { width: 100%; height: 400px; background: rgba(0, 0, 0, 0.25); border-radius: 12px; padding: 20px; overflow-y: auto; box-sizing: border-box; border: 1px inset rgba(255, 255, 255, 0.05); margin-bottom: 15px; }
        .message { margin-bottom: 15px; padding: 14px; border-radius: 12px; line-height: 1.6; }
        .user-msg { background-color: rgba(52, 152, 219, 0.2); border: 1px solid rgba(52, 152, 219, 0.4); text-align: right; margin-left: 20%; }
        .ai-msg { background-color: rgba(46, 204, 113, 0.15); border: 1px solid rgba(46, 204, 113, 0.3); text-align: left; margin-right: 20%; }
        
        #input-area { display: flex; width: 100%; gap: 10px; align-items: stretch; }
        
        #user-input {
            flex-grow: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
            outline: none;
            font-size: 16px; 
            font-family: 'Malgun Gothic', sans-serif;
            min-height: 75px; 
            resize: vertical; 
            line-height: 1.5;
            box-sizing: border-box;
        }
        #user-input::placeholder { color: #888; font-size: 16px; }
        
        #send-btn { 
            padding: 0 30px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.3s; 
        }
        #send-btn:hover { background-color: #2980b9; }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h1>With AI For U Lab</h1>
        <h3>환영합니다. AI 교실밖입니다. 무엇을 도와드릴까요?</h3>
        <div class="menu-container">
            <button class="menu-btn active" id="btn-lesson" onclick="setMode('lesson', '수업과정안 전문가')">수업과정안</button>
            <button class="menu-btn" id="btn-management" onclick="setMode('management', '학급운영 전문가')">학급운영</button>
            <button class="menu-btn" id="btn-rights" onclick="setMode('rights', '교권상담 전문가')">교권상담</button>
            <button class="menu-btn" id="btn-ai_edu" onclick="setMode('ai_edu', 'AI활용 전문가')">AI활용</button>
        </div>
        <div id="chat-box"></div>
        <div id="input-area">
            <textarea id="user-input" placeholder="질문을 입력하세요... (Shift + Enter로 줄바꿈)" onkeydown="handleEnter(event)"></textarea>
            <button id="send-btn" onclick="sendMessage()">전송</button>
        </div>
    </div>
    <script>
        let currentMode = 'lesson';
        function setMode(mode, modeName) {
            currentMode = mode;
            document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            appendMessage('시스템', `[${modeName}] 모드로 전환되었습니다. 무엇을 도와드릴까요?`, 'ai-msg');
        }
        
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;
            
            appendMessage('나', message.replace(/\n/g, '<br>'), 'user-msg');
            inputField.value = '';
            
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ai-msg';
            msgDiv.innerHTML = '<strong>교실밖</strong><br><span class="content"></span>';
            chatBox.appendChild(msgDiv);
            
            const contentSpan = msgDiv.querySelector('.content');
            
            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, mode: currentMode })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    contentSpan.innerHTML += chunk.replace(/\n/g, '<br>');
                    
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            } catch (error) { 
                contentSpan.innerHTML += '<br>통신 오류가 발생했습니다.'; 
            }
        }

        function appendMessage(sender, text, className) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerHTML = `<strong>${sender}</strong><br>${text}`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
    </script>
</body>
</html>
