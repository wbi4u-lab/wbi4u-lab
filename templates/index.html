<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>With AI For U Lab - 교실밖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #ffffff; color: #333333; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #chat-container { width: 100%; max-width: 800px; background: #ffffff; border-radius: 16px; padding: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); display: flex; flex-direction: column; height: 90vh; box-sizing: border-box; border: 1px solid #eaeaea; }
        #chat-box { flex: 1; overflow-y: auto; background-color: #f9f9f9; border-radius: 12px; padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 16px; border: 1px solid #eeeeee; }
        .message { padding: 14px 18px; border-radius: 12px; max-width: 85%; line-height: 1.8; font-size: 16px; word-break: break-all; }
        .user-msg { align-self: flex-end; background-color: #007bff; color: white; border-bottom-right-radius: 4px; }
        .ai-msg { align-self: flex-start; background-color: #ffffff; color: #333333; border: 1px solid #eaeaea; border-bottom-left-radius: 4px; }
        .sender-name { font-weight: 700; font-size: 14px; color: #888888; margin-bottom: 8px; display: block; }
        .ai-msg .sender-name { color: #007bff; }
        .user-msg .sender-name { color: #ffffff; opacity: 0.8; }
        .input-area { display: flex; flex-direction: column; gap: 12px; }
        textarea { width: 100%; height: 90px; padding: 16px; border-radius: 12px; border: 1px solid #eaeaea; background: #ffffff; color: #333333; font-size: 16px; resize: none; box-sizing: border-box; outline: none; font-family: inherit; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; font-size: 16px; font-family: inherit; transition: 0.2s; }
        #send-btn { background-color: #007bff; color: white; }
        #pdf-btn { background-color: #f4f4f4; color: #555555; border: 1px solid #eaeaea; }
        .mode-selector { margin-bottom: 15px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .mode-selector label { font-size: 14px; background: #f4f4f4; padding: 8px 16px; border-radius: 20px; cursor: pointer; border: 1px solid #eaeaea; color: #555555; }
        .mode-selector input { display: none; }
        .mode-selector input:checked + span { color: #007bff; font-weight: 700; }
        .welcome-text { text-align: center; color: #666666; font-size: 15px; margin-bottom: 20px; font-weight: 500; }
        @media (max-width: 480px) { #chat-container { height: 95vh; } }
    </style>
</head>
<body>
    <h3 style="margin: 20px 0 5px 0; color: #1a1a1a; font-weight: 800;">With AI For U Lab</h3>
    <div class="welcome-text">환영합니다. AI 교실밖입니다. 무엇을 도와드릴까요?</div>
    <div id="chat-container">
        <div class="mode-selector">
            <label><input type="radio" name="mode" value="lesson" checked><span>수업과정안</span></label>
            <label><input type="radio" name="mode" value="management"><span>학급운영</span></label>
            <label><input type="radio" name="mode" value="rights"><span>교권상담</span></label>
            <label><input type="radio" name="mode" value="ai_edu"><span>AI활용</span></label>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <textarea id="user-input" placeholder="어떤 도움을 드릴까요? (Enter로 전송)"></textarea>
            <div class="btn-group">
                <button id="send-btn" onclick="ask()">전송</button>
                <button id="pdf-btn" onclick="saveAsPDF()">저장(PDF)</button>
            </div>
        </div>
    </div>

    <script>
        // 전송 이벤트 리스너 통합 (가장 안정적인 방식)
        const userInput = document.getElementById('user-input');
        userInput.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey && window.innerWidth > 480) {
                event.preventDefault();
                ask();
            }
        });

        function appendMessage(sender, message, className) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + className;
            const displayName = (sender === 'AI') ? '교실밖' : '나';
            msgDiv.innerHTML = `<span class="sender-name">${displayName}</span><span class="content">${message}</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        async function ask() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            const mode = document.querySelector('input[name="mode"]:checked').value;
            if (!message) return;

            // 1. 사용자 메시지 추가
            appendMessage('User', message.replace(/\n/g, '<br>'), 'user-msg');
            input.value = '';

            // 2. 답변 영역 생성
            const aiMsgDiv = appendMessage('AI', '생각 중...', 'ai-msg');
            const contentSpan = aiMsgDiv.querySelector('.content');

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, mode })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = ""; 
                contentSpan.innerHTML = ""; // "생각 중..." 문구 제거

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    fullText += chunk;
                    
                    // 줄바꿈 기호를 HTML 태그로 실시간 변환
                    contentSpan.innerHTML = fullText.replace(/\n/g, '<br>');
                    document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
                }
            } catch (error) {
                contentSpan.innerText = "오류 발생: " + error;
            }
        }

        async function saveAsPDF() {
            const { jsPDF } = window.jspdf;
            const chatBox = document.getElementById('chat-box');
            if (!chatBox.hasChildNodes()) { alert("내용이 없습니다."); return; }
            
            const pdfBtn = document.getElementById('pdf-btn');
            pdfBtn.innerText = "저장 중...";
            pdfBtn.disabled = true;

            try {
                const originalStyle = chatBox.style.cssText;
                chatBox.style.cssText = "height: auto; overflow: visible; width: 800px; background-color: #f9f9f9; padding: 20px;";
                const canvas = await html2canvas(chatBox, { scale: 2, useCORS: true, backgroundColor: "#f9f9f9" });
                chatBox.style.cssText = originalStyle;
                
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('p', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const imgProps = pdf.getImageProperties(imgData);
                const imgHeight = (imgProps.height * pdfWidth) / imgProps.width;
                
                pdf.addImage(imgData, 'PNG', 0, 0, pdfWidth, imgHeight);
                pdf.save(`교실밖_상담기록_${new Date().toISOString().slice(0,10)}.pdf`);
            } catch (e) { alert("저장 실패"); }
            finally { 
                pdfBtn.innerText = "저장(PDF)"; 
                pdfBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
