<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>With AI For U Lab - 교실밖</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #1a1a1a; color: #e0e0e0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #chat-container { width: 100%; max-width: 800px; background: #2d2d2d; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #chat-box { height: 500px; overflow-y: auto; border-bottom: 1px solid #444; padding-bottom: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { padding: 12px; border-radius: 8px; max-width: 85%; line-height: 1.6; }
        .user-msg { align-self: flex-end; background-color: #007bff; color: white; }
        .ai-msg { align-self: flex-start; background-color: #3d3d3d; border: 1px solid #555; }
        .btn-group { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 5px; border: 1px solid #444; background: #1a1a1a; color: white; }
        button { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        #send-btn { background-color: #007bff; color: white; flex: 2; }
        #pdf-btn { background-color: #4A90E2; color: white; flex: 1; }
        button:hover { opacity: 0.8; }
        .mode-selector { margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
    </style>
</head>
<body>
    <h2>With AI For U Lab</h2>
    <p>환영합니다. 교실밖 바이브 코딩 실험실입니다.</p>

    <div id="chat-container">
        <div class="mode-selector">
            <label><input type="radio" name="mode" value="lesson" checked> 수업과정안</label>
            <label><input type="radio" name="mode" value="management"> 학급운영</label>
            <label><input type="radio" name="mode" value="rights"> 교권상담</label>
            <label><input type="radio" name="mode" value="ai_edu"> AI활용</label>
        </div>

        <div id="chat-box">
            </div>

        <div style="display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="user-input" placeholder="질문을 입력하세요..." onkeypress="if(event.keyCode==13) ask()">
            <div class="btn-group">
                <button id="send-btn" onclick="ask()">전송</button>
                <button id="pdf-btn" onclick="saveAsPDF()">대화 저장(PDF)</button>
            </div>
        </div>
    </div>

    <script>
        function appendMessage(sender, message, className) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ' + className;
            // 답변자일 때만 '교실밖'으로 표시, 질문자는 '나'로 표시
            const displayName = (sender === 'AI') ? '교실밖' : '나';
            msgDiv.innerHTML = `<strong>${displayName}</strong><br><span class="content">${message}</span>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return msgDiv;
        }

        async function ask() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            const mode = document.querySelector('input[name="mode"]:checked').value;
            if (!message) return;

            appendMessage('User', message.replace(/\n/g, '<br>'), 'user-msg');
            input.value = '';

            const aiMsgDiv = appendMessage('AI', '', 'ai-msg');
            const contentSpan = aiMsgDiv.querySelector('.content');

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, mode })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    contentSpan.innerHTML += decoder.decode(value, { stream: true });
                }
            } catch (error) {
                contentSpan.innerText = "오류가 발생했습니다: " + error;
            }
        }

            const { jsPDF } = window.jspdf;
            const chatBox = document.getElementById('chat-box');

                alert("저장할 대화 내용이 없습니다.");
                return;
            }

                    scale: 2,

                });

                const pdf = new jsPDF('p', 'mm', 'a4');
